# File: localization_params.yaml
# Description: Localization module parameters for MK-Mini

# ── Map Server ────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""        # overridden at launch time via map_yaml arg

map_saver:
  ros__parameters:
    use_sim_time: True
    map_subscribe_transient_local: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65

# ── AMCL ──────────────────────────────────────────────────────
amcl:
  ros__parameters:
    use_sim_time: True
    # ── Motion model noise ────────────────────────────────────
    alpha1: 0.05
    alpha2: 0.05
    alpha3: 0.05
    alpha4: 0.05
    alpha5: 0.05
    # ── Frames ───────────────────────────────────────────────
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    tf_broadcast: true
    transform_tolerance: 1.0
    # ── Laser model ──────────────────────────────────────────
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    max_beams: 60
    scan_topic: /scan
    # ── Beam skip ────────────────────────────────────────────
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    # ── Particle filter ──────────────────────────────────────
    min_particles: 1000
    max_particles: 5000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1
    # ── Measurement weights ──────────────────────────────────
    z_hit: 0.7
    z_max: 0.05
    z_rand: 0.2
    z_short: 0.05
    sigma_hit: 0.2
    lambda_short: 0.1
    # ── Update thresholds ────────────────────────────────────
    update_min_a: 0.1
    update_min_d: 0.1
    save_pose_rate: 0.5
    # ── Recovery ─────────────────────────────────────────────
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
